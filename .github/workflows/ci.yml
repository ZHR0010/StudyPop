name: Cross-platform CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  web-and-api:
    name: Web and API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: node --check server.mjs
      - run: node --check src/app.js
      - run: node --check src/firebase-client.js
      - run: node --check src/api-client.js
      - name: Validate JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('firebase.json'))"
          node -e "JSON.parse(require('fs').readFileSync('firebase/firestore.indexes.json'))"

  desktop:
    name: Electron Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run desktop:pack
      - uses: actions/upload-artifact@v4
        with:
          name: StudyPop-Windows-unpacked
          path: apps/desktop/release/win-unpacked
          if-no-files-found: error

  ios:
    name: SwiftUI iOS
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate
      - name: Build and test
        working-directory: apps/ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project StudyPop.xcodeproj \
            -scheme StudyPop \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
