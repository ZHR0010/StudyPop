name: Cross-platform CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  web-and-api:
    name: Web and API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: node --check server.mjs
      - run: node --check src/app.js
      - run: node --check src/firebase-client.js
      - run: node --check src/api-client.js
      - name: Validate JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('firebase.json'))"
          node -e "JSON.parse(require('fs').readFileSync('firebase/firestore.indexes.json'))"

  desktop:
    name: Electron Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run desktop:pack
      - uses: actions/upload-artifact@v4
        with:
          name: StudyPop-Windows-unpacked
          path: apps/desktop/release/win-unpacked
          if-no-files-found: error

  ios:
    name: SwiftUI iOS
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate
      - name: Build and test
        working-directory: apps/ios
        run: |
          set -o pipefail
          DEVICE_ID="$(
            xcrun simctl list devices available -j | python3 -c '
          import json, sys
          devices = json.load(sys.stdin)["devices"]
          for runtime_devices in devices.values():
              for device in runtime_devices:
                  if device.get("isAvailable") and device.get("name", "").startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit
          raise SystemExit("No available iPhone simulator was found")
          '
          )"
          xcodebuild test \
            -project StudyPop.xcodeproj \
            -scheme StudyPop \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO

  android:
    name: Jetpack Compose Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Make Gradle executable
        run: chmod +x apps/android/gradlew
      - name: Test and build APK
        working-directory: apps/android
        run: ./gradlew testDebugUnitTest assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: StudyPop-Android-debug-apk
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
